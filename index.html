<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>A Question for Ela 💕</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #ffe0ec, #ffd6f5, #ffecd2);
      background-size: 400% 400%;
      animation: bgShift 8s ease infinite;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Georgia', serif;
      overflow: hidden;
      position: relative;
    }

    @keyframes bgShift {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* Floating hearts background */
    .heart-bg {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .float-heart {
      position: absolute;
      bottom: -60px;
      font-size: 1.5rem;
      animation: floatUp linear infinite;
      opacity: 0.5;
    }

    @keyframes floatUp {
      0%   { transform: translateY(0) rotate(0deg); opacity: 0.5; }
      100% { transform: translateY(-110vh) rotate(20deg); opacity: 0; }
    }

    /* Card */
    .card {
      background: rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(12px);
      border-radius: 32px;
      padding: 50px 60px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(255, 100, 150, 0.25);
      position: relative;
      z-index: 10;
      max-width: 500px;
      width: 90%;
      animation: popIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    @keyframes popIn {
      from { transform: scale(0.5); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }

    .emoji-big {
      font-size: 5rem;
      animation: bounce 1.2s ease infinite alternate;
      display: block;
      margin-bottom: 10px;
    }

    @keyframes bounce {
      from { transform: translateY(0); }
      to   { transform: translateY(-18px); }
    }

    h1 {
      font-size: 2rem;
      color: #d63384;
      margin-bottom: 8px;
      letter-spacing: 1px;
    }

    .subtitle {
      font-size: 1.05rem;
      color: #e0609a;
      margin-bottom: 36px;
      font-style: italic;
    }

    .question {
      font-size: 1.55rem;
      color: #333;
      margin-bottom: 38px;
      line-height: 1.5;
    }

    .question span {
      color: #d63384;
      font-weight: bold;
    }

    .buttons {
      display: flex;
      gap: 24px;
      justify-content: center;
      align-items: center;
      flex-wrap: wrap;
    }

    .btn {
      padding: 16px 40px;
      border: none;
      border-radius: 50px;
      font-size: 1.2rem;
      cursor: pointer;
      font-family: 'Georgia', serif;
      transition: transform 0.15s, box-shadow 0.15s;
    }

    .btn-yes {
      background: linear-gradient(135deg, #ff6fa8, #ff3b7a);
      color: white;
      box-shadow: 0 8px 24px rgba(255, 60, 120, 0.45);
    }

    .btn-yes:hover {
      transform: scale(1.12);
      box-shadow: 0 12px 30px rgba(255, 60, 120, 0.6);
    }

    .btn-no {
      background: linear-gradient(135deg, #ccc, #aaa);
      color: #555;
      box-shadow: 0 6px 16px rgba(0,0,0,0.12);
      position: fixed; /* so it can roam freely */
      transition: background 0.3s;
      z-index: 20;
    }

    /* Yes screen */
    #yes-screen {
      display: none;
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, #ff6fa8, #ff3b7a);
      z-index: 100;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      animation: fadeIn 0.6s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.95); }
      to   { opacity: 1; transform: scale(1); }
    }

    #yes-screen h2 {
      font-size: 3rem;
      color: white;
      margin-bottom: 16px;
      text-shadow: 0 4px 20px rgba(0,0,0,0.2);
    }

    #yes-screen p {
      font-size: 1.3rem;
      color: rgba(255,255,255,0.9);
      max-width: 360px;
      line-height: 1.6;
    }

    .big-heart {
      font-size: 7rem;
      animation: heartBeat 0.7s ease infinite alternate;
      display: block;
      margin-bottom: 20px;
    }

    @keyframes heartBeat {
      from { transform: scale(1);    }
      to   { transform: scale(1.25); }
    }

    .confetti-piece {
      position: fixed;
      width: 10px;
      height: 10px;
      border-radius: 2px;
      animation: confettiFall linear forwards;
      z-index: 200;
    }

    @keyframes confettiFall {
      0%   { transform: translateY(-20px) rotate(0deg);   opacity: 1; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }

    /* No counter toast */
    #no-toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: #333;
      color: white;
      padding: 10px 24px;
      border-radius: 50px;
      font-size: 0.95rem;
      z-index: 300;
      opacity: 0;
      transition: opacity 0.4s;
    }

    #no-toast.show { opacity: 1; }
  </style>
</head>
<body>

  <!-- Floating hearts -->
  <div class="heart-bg" id="heartBg"></div>

  <!-- Main card -->
  <div class="card" id="main-card">
    <span class="emoji-big">🥺</span>
    <h1>Hey, My picchu chan 💕</h1>
    <p class="subtitle">I have a very important question for you...</p>
    <p class="question">Do you <span>love me</span>? 🌸</p>
    <div class="buttons">
      <button class="btn btn-yes" onclick="sayYes()">💖 Yes!</button>
      <button class="btn btn-no" id="noBtn" onmouseenter="runAway()" ontouchstart="runAway()">🙈 No</button>
    </div>
  </div>

  <!-- Yes screen -->
  <div id="yes-screen">
    <span class="big-heart">❤️</span>
    <h2>I knew it, Ela!! 🎉</h2>
    <p>You just made me the happiest person in the whole universe! 🌍✨<br><br>
       I love you so so so much! 💕😘</p>
  </div>

  <!-- No escape toast -->
  <div id="no-toast" id="no-toast"></div>

<script>
  // ── Floating hearts background ──────────────────────────
  const heartBg = document.getElementById('heartBg');
  const heartEmojis = ['💕','💗','💓','💞','💖','🌸','✨','🥰','💝'];
  for (let i = 0; i < 18; i++) {
    const h = document.createElement('div');
    h.className = 'float-heart';
    h.textContent = heartEmojis[Math.floor(Math.random() * heartEmojis.length)];
    h.style.left = Math.random() * 100 + 'vw';
    h.style.fontSize = (1 + Math.random() * 1.5) + 'rem';
    h.style.animationDuration = (6 + Math.random() * 10) + 's';
    h.style.animationDelay = (Math.random() * 10) + 's';
    heartBg.appendChild(h);
  }

  // ── Place the No button at a starting position ──────────
  const noBtn = document.getElementById('noBtn');
  let noBtnPlaced = false;

  function placeNoBtnInitial() {
    const card = document.getElementById('main-card');
    const rect = card.getBoundingClientRect();
    // Start at the right side of the Yes button area
    noBtn.style.left = (rect.left + rect.width * 0.62) + 'px';
    noBtn.style.top  = (rect.top  + rect.height * 0.78) + 'px';
    noBtnPlaced = true;
  }

  window.addEventListener('load', placeNoBtnInitial);
  window.addEventListener('resize', placeNoBtnInitial);

  // ── No button runs away ──────────────────────────────────
  let noEscapeCount = 0;
  const funnyMessages = [
    "Nope, come back! 😤",
    "You can't click that! 😂",
    "The button is SHY 🙈",
    "Wrong direction, Ela! 💨",
    "Haha nice try! 😝",
    "That button doesn't exist 🫣",
    "It's running for its life! 🏃",
    "IMPOSSIBLE to click! 😈",
    "Even the button knows you love me 💕",
  ];

  function runAway() {
    noEscapeCount++;
    const margin = 20;
    const bw = noBtn.offsetWidth;
    const bh = noBtn.offsetHeight;
    const maxX = window.innerWidth  - bw - margin;
    const maxY = window.innerHeight - bh - margin;

    let newX, newY;
    // Try to pick a spot far from current position
    const cx = parseFloat(noBtn.style.left) || window.innerWidth / 2;
    const cy = parseFloat(noBtn.style.top)  || window.innerHeight / 2;
    let attempts = 0;
    do {
      newX = margin + Math.random() * maxX;
      newY = margin + Math.random() * maxY;
      attempts++;
    } while (Math.hypot(newX - cx, newY - cy) < 200 && attempts < 20);

    noBtn.style.left = newX + 'px';
    noBtn.style.top  = newY + 'px';

    // Show a funny toast
    const msg = funnyMessages[Math.min(noEscapeCount - 1, funnyMessages.length - 1)];
    showToast(msg);

    // Grow the Yes button a little each time 😂
    const yesBtn = document.querySelector('.btn-yes');
    const currentSize = parseFloat(yesBtn.style.fontSize) || 1.2;
    yesBtn.style.fontSize = Math.min(currentSize + 0.06, 2) + 'rem';
  }

  function showToast(msg) {
    const toast = document.getElementById('no-toast');
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(toast._timer);
    toast._timer = setTimeout(() => toast.classList.remove('show'), 1800);
  }

  // ── Yes! ─────────────────────────────────────────────────
  function sayYes() {
    document.getElementById('yes-screen').style.display = 'flex';
    launchConfetti();
  }

  function launchConfetti() {
    const colors = ['#ff6fa8','#ffb347','#87ceeb','#98fb98','#dda0dd','#fff'];
    for (let i = 0; i < 120; i++) {
      setTimeout(() => {
        const c = document.createElement('div');
        c.className = 'confetti-piece';
        c.style.background = colors[Math.floor(Math.random() * colors.length)];
        c.style.left = Math.random() * 100 + 'vw';
        c.style.top  = '-20px';
        c.style.width  = (8 + Math.random() * 10) + 'px';
        c.style.height = (8 + Math.random() * 10) + 'px';
        c.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
        c.style.animationDuration = (2 + Math.random() * 3) + 's';
        c.style.animationDelay = '0s';
        document.body.appendChild(c);
        setTimeout(() => c.remove(), 5000);
      }, i * 30);
    }
  }
</script>
</body>
</html>
